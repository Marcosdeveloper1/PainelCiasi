<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINEL CIASI — OPERACIONAL</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --surface: #0a1520;
    --surface2: #0d1d2e;
    --border: #1a3a5c;
    --accent: #00c8ff;
    --accent2: #0080b3;
    --text: #c8dae8;
    --text-dim: #4a7a9b;
    --glow: 0 0 20px rgba(0,200,255,0.3);
    --glow-sm: 0 0 8px rgba(0,200,255,0.2);

    /* Status colors */
    --esv: #00e676;
    --ssv: #ff1744;
    --res: #aa00ff;
    --folga: #ff6d00;
    --licenca: #ffab00;
    --demolicao: #00b0ff;
    --apoio: #ffd600;
    --default: #546e7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* === HEADER === */
  header {
    background: linear-gradient(135deg, #05131e 0%, #071929 100%);
    border-bottom: 2px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,200,255,0.05);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo-badge {
    width: 44px;
    height: 44px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-align: center;
    line-height: 1.2;
    letter-spacing: 0.5px;
    box-shadow: var(--glow-sm), inset 0 0 10px rgba(0,200,255,0.05);
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: var(--glow-sm), inset 0 0 10px rgba(0,200,255,0.05); }
    50% { box-shadow: var(--glow), inset 0 0 20px rgba(0,200,255,0.1); }
  }

  .header-title h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-title p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .header-center {
    text-align: center;
  }

  .date-display {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: white;
    letter-spacing: 2px;
  }

  .time-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: var(--esv);
    border-radius: 50%;
    animation: blink 1.5s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* === COUNTERS BAR === */
  .counters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .counter-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.07);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    background: rgba(0,0,0,0.3);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .counter-chip:hover, .counter-chip.active {
    border-color: currentColor;
    background: rgba(255,255,255,0.05);
  }

  .counter-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
  }

  .counter-chip .n {
    opacity: 0.7;
    margin-left: 2px;
  }

  /* === CONTROLS === */
  .controls {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }

  .search-box input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px 8px 36px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-dim); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }

  .controls-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .control-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  select {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--accent); }

  .btn-reload {
    background: rgba(0,200,255,0.1);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 8px 16px;
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-reload:hover {
    background: rgba(0,200,255,0.2);
    box-shadow: var(--glow-sm);
  }

  /* === MAIN GRID === */
  main {
    padding: 24px 32px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  /* === CARD === */
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.25s ease;
    position: relative;
    animation: fadeIn 0.4s ease both;
    cursor: default;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: var(--accent2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), var(--glow-sm);
    transform: translateY(-2px);
  }

  .card-photo {
    position: relative;
    height: 170px;
    background: linear-gradient(180deg, #0a1825 0%, #071220 100%);
    overflow: hidden;
  }

  .card-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    transition: opacity 0.3s;
  }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(5,10,15,0.9) 100%);
  }

  /* Avatar placeholder */
  .avatar-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-dim);
  }

  .avatar-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-icon svg {
    width: 36px;
    height: 36px;
    fill: var(--text-dim);
  }

  /* Grad badge */
  .grad-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(0,200,255,0.3);
    border-radius: 3px;
    padding: 2px 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 1px;
    backdrop-filter: blur(4px);
  }

  .card-body {
    padding: 10px 12px;
  }

  .card-nome {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .card-saram {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .card-status {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 10px;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    justify-content: center;
  }

  .card-status .s-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* === STATUS COLORS === */
  .s-ESV    { background: rgba(0,230,118,0.15);  color: #00e676; border: 1px solid rgba(0,230,118,0.4); }
  .s-SSV    { background: rgba(255,23,68,0.15);  color: #ff5252; border: 1px solid rgba(255,23,68,0.4); }
  .s-RES    { background: rgba(170,0,255,0.15);  color: #ce93d8; border: 1px solid rgba(170,0,255,0.4); }
  .s-FOLGA  { background: rgba(255,109,0,0.15);  color: #ff9800; border: 1px solid rgba(255,109,0,0.4); }
  .s-LIC    { background: rgba(255,171,0,0.15);  color: #ffcc02; border: 1px solid rgba(255,171,0,0.4); }
  .s-DEMOL  { background: rgba(0,176,255,0.15);  color: #40c4ff; border: 1px solid rgba(0,176,255,0.4); }
  .s-APOIO  { background: rgba(255,214,0,0.15);  color: #ffd600; border: 1px solid rgba(255,214,0,0.4); }
  .s-NA     { background: rgba(84,110,122,0.15); color: #78909c; border: 1px solid rgba(84,110,122,0.3); }

  /* === LOADING === */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 20px;
    transition: opacity 0.4s;
  }

  .loading-screen.hide {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    animation: blink 1s step-end infinite;
  }

  /* === EMPTY STATE === */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* === ERROR BANNER === */
  .error-banner {
    background: rgba(255,23,68,0.1);
    border: 1px solid rgba(255,23,68,0.3);
    border-radius: 6px;
    padding: 12px 20px;
    margin: 16px 32px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #ff5252;
    letter-spacing: 1px;
    display: none;
  }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    header { padding: 0 16px; height: auto; padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .header-center { order: 3; width: 100%; text-align: left; }
    main { padding: 16px; }
    .counters-bar, .controls { padding: 10px 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text">CARREGANDO EFETIVO...</div>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="logo-badge">CIA<br>SI</div>
    <div class="header-title">
      <h1>PAINEL CIASI</h1>
      <p>SITUAÇÃO OPERACIONAL DO DIA</p>
    </div>
  </div>

  <div class="header-center">
    <div class="date-display" id="dateDisplay">—</div>
    <div class="time-display" id="timeDisplay">00:00:00</div>
  </div>

  <div class="header-right">
    <div class="status-dot"></div>
    <span>SISTEMA ATIVO</span>
  </div>
</header>

<!-- Counters -->
<div class="counters-bar" id="countersBar">
  <!-- Preenchido via JS -->
</div>

<!-- Controls -->
<div class="controls">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="BUSCAR MILITAR..." oninput="filtrar()">
  </div>

  <span class="control-label">FILTRO:</span>
  <select id="filterFuncao" onchange="filtrar()">
    <option value="">TODOS</option>
    <option value="SEÇÃO">SEÇÃO</option>
    <option value="TROPA">TROPA</option>
  </select>

  <div class="controls-right">
    <span class="control-label" id="totalLabel">0 MILITARES</span>
    <button class="btn-reload" onclick="recarregar()">↻ ATUALIZAR</button>
  </div>
</div>

<!-- Error -->
<div class="error-banner" id="errorBanner"></div>

<!-- Grid -->
<main>
  <div class="grid" id="grid"></div>
</main>

<script>
// ========================================================
// CONFIGURAÇÃO — AJUSTE OS LINKS AQUI SE NECESSÁRIO
// ========================================================
const URL_ESCALA  = "https://opensheet.elk.sh/158Xh211avd9R3ptOhhdwg4Ckhz4aav-Zxd3P5EC7fcs/ESCALA%20CIASI%20PELOT%C3%B5ES";
const URL_EFETIVO = "https://opensheet.elk.sh/1PSVy8cOTolQw9MG0lajqa-dVO284KtnZBp6LJWgmPVI/EFETIVO";

// ID da pasta do Drive com as fotos
const DRIVE_FOLDER_ID = "1hbFv2zKOjU_VExVdzsGR4ypBNqoXIo5Y";

// ========================================================

// Mapeamento de status → classe CSS e cor
const STATUS_MAP = {
  "ESV":        { cls: "s-ESV",   label: "ESV",        cor: "#00e676" },
  "SSV":        { cls: "s-SSV",   label: "SSV",        cor: "#ff5252" },
  "RES":        { cls: "s-RES",   label: "RES",        cor: "#ce93d8" },
  "FOLGA":      { cls: "s-FOLGA", label: "FOLGA",      cor: "#ff9800" },
  "LIC":        { cls: "s-LIC",   label: "LICENÇA",    cor: "#ffcc02" },
  "LTS":        { cls: "s-LIC",   label: "LTS",        cor: "#ffcc02" },
  "DEMOLIÇÃO":  { cls: "s-DEMOL", label: "DEMOLIÇÃO",  cor: "#40c4ff" },
  "DEMOLICAO":  { cls: "s-DEMOL", label: "DEMOLIÇÃO",  cor: "#40c4ff" },
  "APOIO":      { cls: "s-APOIO", label: "APOIO",      cor: "#ffd600" },
};

function getStatusInfo(raw) {
  if (!raw || raw.trim() === "" || raw === "N/A") return { cls: "s-NA", label: "—", cor: "#78909c" };
  const key = raw.trim().toUpperCase().replace(/\s+/g,"").normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  for (const [k, v] of Object.entries(STATUS_MAP)) {
    const normK = k.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if (key.startsWith(normK) || normK.startsWith(key)) return v;
  }
  return { cls: "s-NA", label: raw.trim(), cor: "#78909c" };
}

function getDataHoje() {
  const meses = ["jan.","fev.","mar.","abr.","mai.","jun.","jul.","ago.","set.","out.","nov.","dez."];
  const hoje = new Date();
  return hoje.getDate() + "/" + meses[hoje.getMonth()];
}

function getDataFormatada() {
  const hoje = new Date();
  return hoje.toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long", year: "numeric" }).toUpperCase();
}

// Relógio
function atualizarRelogio() {
  const agora = new Date();
  document.getElementById("timeDisplay").textContent =
    agora.toLocaleTimeString("pt-BR");
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();
document.getElementById("dateDisplay").textContent = getDataHoje().toUpperCase() + " — " + new Date().toLocaleDateString("pt-BR",{month:"short",year:"numeric"}).toUpperCase();

// Dados globais
let DADOS = [];
let filtroStatus = null;

// Cache de IDs do Drive: filename → driveId
const driveCache = {};

// Construir URL da foto
// Estratégia: tenta usando proxy via Drive export por ID extraído do nome
// O nome no AppSheet: "EFETIVO_Images/ID_EFETIVOxx.FOTO.hhmmss.jpg"
// Não temos os IDs — então usamos placeholder com iniciais bonitas
function fotoURL(caminho) {
  if (!caminho) return null;
  // Se por acaso vier um ID do Drive diretamente
  if (caminho.startsWith("http")) return caminho;
  return null; // sem ID real, usamos avatar
}

function avatarHTML(nome, graduacao) {
  const iniciais = nome.trim().split(" ").slice(0,2).map(p => p[0]).join("").toUpperCase();
  return `
    <div class="avatar-placeholder">
      <div class="avatar-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
      <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;">${iniciais}</span>
    </div>`;
}

function criarCard(m, foto, situacao, idx) {
  const { cls, label } = getStatusInfo(situacao);
  const nome = (m.EFETIVO || m.CIASI || m.NOME || "").trim();
  const saram = (m.SARAM || "").trim();
  const grad = (m.GRADUAÇÃO || m.GRAD || "").trim();
  const funcao = (m.FUNÇÃO || "").trim();

  const temFoto = !!foto;
  const fotoTag = temFoto
    ? `<img src="${foto}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${nome}"><div class="avatar-placeholder" style="display:none;position:absolute;inset:0;background:var(--surface2);">${avatarHTML(nome, grad)}</div>`
    : `<div class="avatar-placeholder">${avatarHTML(nome, grad).replace('<div class="avatar-placeholder">', '').replace('</div>', '')}</div>`;

  const card = document.createElement("div");
  card.className = "card";
  card.dataset.nome = nome.toLowerCase();
  card.dataset.status = label;
  card.dataset.funcao = funcao;
  card.style.animationDelay = (idx * 30) + "ms";

  card.innerHTML = `
    <div class="card-photo">
      ${temFoto
        ? `<img src="${foto}" onerror="this.style.display='none';this.parentElement.innerHTML+=\`${avatarHTML(nome, grad).replace(/`/g,"'")}\`" alt="${nome}">`
        : avatarHTML(nome, grad)
      }
      <div class="photo-overlay"></div>
      ${grad ? `<div class="grad-badge">${grad}</div>` : ""}
    </div>
    <div class="card-body">
      <div class="card-nome" title="${nome}">${nome}</div>
      <div class="card-saram">${saram ? "SARAM " + saram : "—"}</div>
      <div class="card-status ${cls}">
        <div class="s-dot"></div>
        ${label}
      </div>
    </div>
  `;

  return card;
}

function renderizarContadores() {
  const counts = {};
  for (const item of DADOS) {
    const { label, cor } = getStatusInfo(item._situacao);
    if (!counts[label]) counts[label] = { n: 0, cor };
    counts[label].n++;
  }

  const bar = document.getElementById("countersBar");
  bar.innerHTML = `<span class="control-label" style="margin-right:4px">SITUAÇÃO:</span>`;

  // Chip TODOS
  const allChip = document.createElement("div");
  allChip.className = "counter-chip" + (filtroStatus === null ? " active" : "");
  allChip.style.color = "#94a3b8";
  allChip.innerHTML = `<div class="dot"></div> TODOS <span class="n">(${DADOS.length})</span>`;
  allChip.onclick = () => { filtroStatus = null; renderizarContadores(); filtrar(); };
  bar.appendChild(allChip);

  for (const [status, { n, cor }] of Object.entries(counts)) {
    const chip = document.createElement("div");
    chip.className = "counter-chip" + (filtroStatus === status ? " active" : "");
    chip.style.color = cor;
    chip.innerHTML = `<div class="dot"></div> ${status} <span class="n">(${n})</span>`;
    chip.onclick = () => { filtroStatus = filtroStatus === status ? null : status; renderizarContadores(); filtrar(); };
    bar.appendChild(chip);
  }
}

function filtrar() {
  const busca = (document.getElementById("searchInput").value || "").toLowerCase();
  const funcaoFiltro = document.getElementById("filterFuncao").value;
  const cards = document.querySelectorAll(".card");
  let visíveis = 0;

  cards.forEach(card => {
    const nomeOk = !busca || card.dataset.nome.includes(busca);
    const statusOk = !filtroStatus || card.dataset.status === filtroStatus;
    const funcaoOk = !funcaoFiltro || card.dataset.funcao === funcaoFiltro;

    if (nomeOk && statusOk && funcaoOk) {
      card.style.display = "";
      visíveis++;
    } else {
      card.style.display = "none";
    }
  });

  document.getElementById("totalLabel").textContent = visíveis + " MILITARES";

  // Empty state
  let emptyEl = document.querySelector(".empty-state");
  if (visíveis === 0) {
    if (!emptyEl) {
      emptyEl = document.createElement("div");
      emptyEl.className = "empty-state";
      emptyEl.textContent = "NENHUM REGISTRO ENCONTRADO";
      document.getElementById("grid").appendChild(emptyEl);
    }
  } else {
    if (emptyEl) emptyEl.remove();
  }
}

async function carregar() {
  document.getElementById("loadingScreen").classList.remove("hide");
  document.getElementById("errorBanner").style.display = "none";
  document.getElementById("grid").innerHTML = "";
  DADOS = [];

  try {
    const DIA = getDataHoje();

    // Carregar as duas planilhas em paralelo
    const [resEscala, resEfetivo] = await Promise.all([
      fetch(URL_ESCALA).catch(() => null),
      fetch(URL_EFETIVO).catch(() => null)
    ]);

    if (!resEfetivo || !resEfetivo.ok) {
      throw new Error("Planilha EFETIVO inacessível. Verifique se está publicada publicamente: Arquivo → Compartilhar → Publicar na Web → aba EFETIVO.");
    }

    let efetivo = await resEfetivo.json();
    // Garante que é array
    if (!Array.isArray(efetivo)) {
      if (efetivo && typeof efetivo === 'object') efetivo = Object.values(efetivo);
      else throw new Error("Formato inesperado na planilha EFETIVO.");
    }

    // Mapa SARAM → dados do efetivo
    const efMap = {};
    efetivo.forEach(e => {
      const s = (e.SARAM || "").trim();
      if (s) efMap[s] = e;
    });

    // Mapa nome → dados efetivo (fallback)
    const nomeMap = {};
    efetivo.forEach(e => {
      const n = (e.EFETIVO || "").trim().toUpperCase();
      if (n) nomeMap[n] = e;
    });

    let militares = [];

    if (resEscala && resEscala.ok) {
      // Usar planilha de escala
      const escala = await resEscala.json();

      escala.forEach(m => {
        const nome = (m.CIASI || m.NOME || "").trim();
        if (!nome) return;
        const saram = (m.SARAM || "").trim();
        const situacao = (m[DIA] || "").trim();

        let ef = efMap[saram] || nomeMap[nome.toUpperCase()] || null;

        // Busca FOTO_URL — nome confirmado na planilha
        let fotoURL = null;
        if (ef) {
          fotoURL = ef["FOTO_URL"] || null;
          // fallback: varre chaves caso haja variação
          if (!fotoURL) {
            for (const key of Object.keys(ef)) {
              if (key.trim().toUpperCase().replace(/[\s_]/g,"") === "FOTOURL") {
                if (ef[key] && ef[key].startsWith("http")) { fotoURL = ef[key]; break; }
              }
            }
          }
        }

        militares.push({
          _nome: nome,
          _saram: saram,
          _situacao: situacao,
          _foto: fotoURL,
          _grad: ef ? (ef["GRADUAÇÃO"] || ef["GRADUACAO"] || "") : (m["GRADUAÇÃO"] || ""),
          _funcao: ef ? (ef["FUNÇÃO"] || ef["FUNCAO"] || "") : "",
          EFETIVO: nome,
          SARAM: saram,
          GRADUAÇÃO: ef ? (ef["GRADUAÇÃO"] || "") : (m["GRADUAÇÃO"] || ""),
          FUNÇÃO: ef ? (ef["FUNÇÃO"] || "") : "",
        });
      });
    } else {
      // Fallback: usar só efetivo sem situação
      efetivo.forEach(e => {
        const nome = (e.EFETIVO || "").trim();
        if (!nome) return;
        militares.push({
          _nome: nome,
          _saram: (e.SARAM || "").trim(),
          _situacao: "",
          _foto: (() => { for (const k of Object.keys(e)) { if (k.trim().toLowerCase().replace(/[\s_]/g,"") === "fotourl" && e[k] && e[k].startsWith("http")) return e[k]; } return null; })(),
          _grad: e.GRADUAÇÃO || "",
          _funcao: e.FUNÇÃO || "",
          ...e
        });
      });

      mostrarErro("⚠ PLANILHA DE ESCALA INDISPONÍVEL — Publique a aba 'ESCALA CIASI PELOTÕES' no Google Sheets (Arquivo → Compartilhar → Publicar na Web). Exibindo efetivo sem situação.");
    }

    DADOS = militares;

    // Renderizar grid
    const grid = document.getElementById("grid");
    militares.forEach((m, idx) => {
      // Foto já vem processada como URL válida ou null
      const fotoUrl = m._foto || null;

      const card = criarCard(m, fotoUrl, m._situacao, idx);
      grid.appendChild(card);
    });

    renderizarContadores();
    document.getElementById("totalLabel").textContent = militares.length + " MILITARES";

  } catch (err) {
    console.error(err);
    mostrarErro("ERRO AO CARREGAR DADOS: " + err.message + " — Verifique se as planilhas estão publicadas publicamente.");
  } finally {
    document.getElementById("loadingScreen").classList.add("hide");
  }
}

function mostrarErro(msg) {
  const el = document.getElementById("errorBanner");
  el.textContent = msg;
  el.style.display = "block";
}

function recarregar() {
  carregar();
}

// Iniciar
carregar();
</script>
